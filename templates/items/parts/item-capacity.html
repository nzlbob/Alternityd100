<h3 class="form-header">{{ localize "SFRPG.CapacityUsage" }}</h3>

<div class="form-group">
    <label>{{ localize "SFRPG.Items.Ammunition.AmmunitionType" }}</label>
    <div class="form-fields">
        <select name="system.ammunitionType">
            {{ selectOptions d100Aconfig.ammunitionTypes selected=itemData.ammunitionType blank="None" }}
        </select>
    </div>
</div>

<div class="form-group">
    <label data-tooltip="{{ localize "SFRPG.Items.Capacity.HeaderTooltip" }}">
        {{ localize "SFRPG.Items.Capacity.Capacity" }}
    </label>
    <div class="form-fields">
        {{#unless system.ammunitionType}}
        <input type="text" data-tooltip="{{ localize "SFRPG.Items.Capacity.CapacityValueTooltip" }}" name="system.capacity.value" value="{{itemData.capacity.value}}" data-dtype="Number" />
        <span class="sep"> / </span>
        {{/unless}}
        <input type="text" data-tooltip="{{ localize "SFRPG.Items.Capacity.CapacityMaxTooltip" }}" name="system.capacity.max" value="{{itemData.capacity.max}}" data-dtype="Number" />
    </div>
</div>

<div class="form-group">
    <label data-tooltip="{{ localize "SFRPG.Items.Capacity.UsageTooltip" }}">
        {{ localize "SFRPG.Items.Capacity.Usage" }}
    </label>
    <div class="form-fields">
        <input type="text" data-tooltip="{{ localize "SFRPG.Items.Capacity.UsageTooltip" }}" name="system.usage.value" value="{{itemData.usage.value}}" data-dtype="Number" />
        <span class="sep"> / </span>
 
        <select name="system.usage.per" data-tooltip="{{ localize "SFRPG.Items.Capacity.UsageValueTooltip" }}">
            {{ selectOptions d100Aconfig.capacityUsagePer selected=itemData.usage.per blank="" }}
        </select>
        
    </div>
</div>

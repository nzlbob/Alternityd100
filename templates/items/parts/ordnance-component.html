<h4 class="section-header first">{{ localize "Common Ordnance Properties" }}</h4>



<div class="form-group" data-tooltip="{{ localize " SFRPG.ItemSheet.StarshipFrame.Details.PriceTooltip" }}">
    <label>{{ localize "Price" }}</label>
    <div class="form-fields">
        <input type="text" name="system.price" value="{{itemData.price}}" data-dtype="Number" />
    </div>
</div>
<div class="form-group" data-tooltip="<b>{{ localize " SFRPG.ItemSheet.StarshipEngine.Size" }}</b><br />{{ localize
    "SFRPG.ItemSheet.StarshipEngine.SizeTooltip" }}">
    <label>{{ localize "Progress Level" }}</label>
    <select name="system.progressLevel">
        {{ selectOptions d100Aconfig.progressLevel selected=itemData.progressLevel blank=""
        }}
    </select>
</div>

<div class="form-group" data-tooltip="<b>{{ localize " SFRPG.ItemSheet.StarshipEngine.Size" }}</b><br />{{ localize
    "SFRPG.ItemSheet.StarshipEngine.SizeTooltip" }}">
    <label>{{ localize "Tech" }}</label>
    <td><input type="text" name="system.tech" value="{{itemData.tech}}" data-dtype="Text" placeholder="-" /></td>
</div>
